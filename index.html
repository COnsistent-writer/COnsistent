<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSISTENT</title>
    <meta name="description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:title" content="CONSISTENT">
    <meta property="og:description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://consistent.ro">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080808;
            --text: #ffffff;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background floating words */
        .bg-words {
            position: fixed; inset: 0;
            overflow: hidden; z-index: 0; pointer-events: none;
        }

        .bg-word {
            position: absolute;
            font-weight: 200;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
            user-select: none;
            animation: breathe var(--dur) var(--del) linear forwards;
            transition: color 0.3s, transform 0.3s, text-shadow 0.3s;
            pointer-events: all;
            cursor: default;
        }

        .bg-word:hover {
            color: rgba(255, 255, 255, 0.5) !important;
            transform: scale(1.2) !important;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
            animation-play-state: paused;
        }

        @keyframes breathe {
            0% { opacity: 0; transform: translateY(6px) scale(0.98); filter: blur(1px); }
            15% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
            75% { opacity: 1; transform: translateY(-3px) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-8px) scale(0.99); filter: blur(2px); }
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 75%);
            pointer-events: none; z-index: 1;
        }

        /* Main content — centered vertically with slight upward offset */
        .content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 24px;
            margin-top: -5vh;
        }

        .title {
            font-size: clamp(36px, 9vw, 100px); font-weight: 900;
            letter-spacing: 0.12em; line-height: 1;
            background: linear-gradient(180deg, #ffffff 20%, #4a4a4a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            opacity: 0; transform: translateY(20px);
            animation: rise 1.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .divider {
            width: 50px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            margin: 24px auto; opacity: 0; animation: expandLine 1.2s 1s ease-out forwards;
        }

        .tagline {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(16px, 2.5vw, 24px); font-weight: 400; font-style: italic;
            color: rgba(255,255,255,0.55); letter-spacing: 0.02em; line-height: 1.7;
            opacity: 0; animation: fadeUp 1.5s 1.3s ease-out forwards;
            max-width: 420px; margin: 0 auto;
            padding: 0 16px;
        }

        .coming {
            margin-top: 40px; font-size: 12px; font-weight: 700;
            letter-spacing: 0.35em; text-transform: uppercase;
            color: rgba(255,255,255,0.35); opacity: 0;
            animation: fadeUp 1.5s 1.8s ease-out forwards;
            border: 1px solid rgba(255,255,255,0.08);
            display: inline-block; padding: 8px 24px;
        }

        /* Email — fixed bottom, always visible */
        .subscribe {
            position: fixed; bottom: 50px; left: 0; right: 0;
            z-index: 4; opacity: 0; text-align: center;
            padding: 0 24px;
            animation: fadeUp 1.5s 2.2s ease-out forwards;
        }

        .subscribe form {
            display: flex; gap: 0;
            max-width: 320px; margin: 0 auto;
        }

        .subscribe input[type="email"] {
            flex: 1; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-right: none;
            border-radius: 4px 0 0 4px; padding: 10px 14px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300;
            letter-spacing: 0.03em; outline: none; transition: border-color 0.3s;
            min-width: 0;
        }

        .subscribe input[type="email"]::placeholder { color: rgba(255,255,255,0.2); }
        .subscribe input[type="email"]:focus { border-color: rgba(255,255,255,0.25); }

        .subscribe button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 0 4px 4px 0;
            padding: 10px 16px; color: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }

        .subscribe button:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }

        .subscribe .msg {
            margin-top: 8px; font-size: 12px; font-weight: 300;
            color: rgba(255,255,255,0.3); min-height: 18px;
        }

        /* Footer */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 4; text-align: center; padding: 12px 16px;
            font-size: 10px; font-weight: 300; color: rgba(255,255,255,0.1);
            letter-spacing: 0.05em;
        }

        .footer a {
            color: rgba(255,255,255,0.15); text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover { color: rgba(255,255,255,0.35); }

        @keyframes rise { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes expandLine { from { width: 0; opacity: 0; } to { width: 50px; opacity: 1; } }

        /* Grain */
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 5;
        }

        /* Mobile fixes */
        @media (max-width: 600px) {
            .content { margin-top: -8vh; }
            .title { letter-spacing: 0.08em; }
            .tagline { font-size: 17px; padding: 0 12px; }
            .coming { margin-top: 28px; font-size: 11px; padding: 7px 20px; }
            .subscribe { bottom: 42px; }
            .subscribe form { max-width: 280px; }
            .subscribe input[type="email"] { padding: 10px 12px; font-size: 12px; }
            .subscribe button { padding: 10px 12px; font-size: 10px; }
            .footer { font-size: 9px; padding: 8px 12px; }
            .bg-word { letter-spacing: 0.1em; }
        }

        @media (max-width: 360px) {
            .title { letter-spacing: 0.05em; }
            .tagline { font-size: 15px; }
            .subscribe { bottom: 36px; }
            .subscribe form { max-width: 260px; }
        }

        /* Landscape mobile */
        @media (max-height: 500px) {
            .content { margin-top: 0; }
            .divider { margin: 12px auto; }
            .coming { margin-top: 16px; }
            .subscribe { bottom: 32px; }
        }
    </style>
</head>
<body>

    <div class="bg-words" id="bgWords"></div>
    <div class="vignette"></div>
    <canvas id="ripple" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></canvas>

    <div class="content">
        <div class="title">CONSISTENT</div>
        <div class="divider"></div>
        <div class="tagline">Cartea pe care nimeni nu ți-o dă,<br>dar pe care o cauți de ani.</div>
        <div class="coming">In curând</div>
    </div>

    <div class="subscribe">
        <form id="subscribeForm">
            <input type="email" id="emailInput" name="email" placeholder="adresa ta de email" required>
            <button type="submit">Anunță-mă</button>
        </form>
        <div class="msg" id="formMsg"></div>
    </div>

    <footer class="footer">
        &copy; 2026 CONSISTENT &nbsp;&middot;&nbsp;
        <a href="/confidentialitate.html">Confidențialitate</a> &nbsp;&middot;&nbsp;
        contact@consistent.ro
    </footer>

    <script>
        const words = [
            'ridică-te', 'fă ce trebuie', 'disciplină', 'curaj', 'putere',
            'consistență', 'fapte nu vorbe', 'acțiune', 'rezistență', 'hotărâre',
            'nu mâine. azi.', 'execuție', 'persistență', 'determinare',
            'masculinitate', 'onoare', 'caracter', 'integritate', 'coloană vertebrală',
            'fii de neclintit', 'responsabilitate', 'stăpânire de sine', 'bărbat',
            'maturitate', 'respect câștigat', 'autoritate interioară',
            'adevăr', 'fără scuze', 'oglinda', 'luciditate', 'autenticitate',
            'nu te mai minți', 'confruntare', 'alegere', 'direcție', 'scop',
            'transformare', 'reconstrucție', 'libertate', 'renaștere',
            'fiecare zi contează', 'devino', 'crește', 'evoluție',
            'cât mai suporți?', 'știi ce ai de făcut', 'fă-o acum',
            'nu mai fugi', 'confruntă-te', 'trăiește real',
            'tăcerea te distruge', 'alege durerea care construiește',
            'nu ești victimă', 'oprește-te din fugă', 'privește-te în ochi',
            'merită suferința?', 'cine ești de fapt?', 'ce vrei cu adevărat?',
            'fii incomod', 'spune adevărul', 'renunță la mască',
            'acceptă durerea', 'fii prezent', 'nu mai amâna',
            'ține-ți cuvântul', 'fii om de cuvânt', 'construiește zilnic',
            'fii tată', 'fii lider', 'fii mentor', 'fii exemplu',
            'trezește-te', 'luptă pentru tine', 'mergi înainte',
            'nu cere permisiune', 'asumă-ți greșelile', 'crește prin durere',
            'fii prezent acolo unde contează', 'lasă ego-ul', 'ascultă mai mult',
            'protejează ce iubești', 'construiește ceva care rămâne',
            'fii constant', 'nu perfect — consistent', 'zi de zi',
            'un pas', 'începe acum', 'termină ce ai început'
        ];

        const bg = document.getElementById('bgWords');
        const isMobile = window.innerWidth < 600;

        function spawnWord() {
            const word = words[Math.floor(Math.random() * words.length)];
            const el = document.createElement('div');
            el.className = 'bg-word';
            el.textContent = word;

            // Keep words away from center content on mobile
            let left, top;
            if (isMobile) {
                left = 3 + Math.random() * 94;
                top = Math.random() > 0.5 ? (Math.random() * 25) : (65 + Math.random() * 20);
            } else {
                left = 3 + Math.random() * 94;
                top = 3 + Math.random() * 90;
            }

            el.style.left = left + '%';
            el.style.top = top + '%';

            const dur = 3 + Math.random() * 5;
            el.style.setProperty('--dur', dur + 's');
            el.style.setProperty('--del', '0s');
            el.style.setProperty('color', `rgba(255,255,255,${0.07 + Math.random() * 0.08})`);
            el.style.fontSize = (isMobile ? 10 + Math.random() * 10 : 11 + Math.random() * 16) + 'px';
            bg.appendChild(el);
            setTimeout(() => { el.remove(); }, dur * 1000);
        }

        const initialCount = isMobile ? 20 : 40;
        const spawnRate = isMobile ? 400 : 250;

        for (let i = 0; i < initialCount; i++) setTimeout(spawnWord, Math.random() * 1500);
        setInterval(spawnWord, spawnRate);

        // Ripple effect (desktop only)
        const canvas = document.getElementById('ripple');
        const ctx = canvas.getContext('2d');
        let ripples = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 0.06 });
                if (ripples.length > 6) ripples.shift();
            });
        }

        function drawRipples() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples = ripples.filter(rip => rip.alpha > 0.001);
            ripples.forEach(rip => {
                rip.r += 1.5;
                rip.alpha *= 0.97;
                ctx.beginPath();
                ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,255,255,${rip.alpha})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            });
            requestAnimationFrame(drawRipples);
        }
        drawRipples();

        // Click/tap spawns burst of words
        document.addEventListener('click', (e) => {
            if (e.target.closest('.subscribe') || e.target.closest('.footer') || e.target.closest('a')) return;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const word = words[Math.floor(Math.random() * words.length)];
                    const el = document.createElement('div');
                    el.className = 'bg-word';
                    el.textContent = word;
                    const angle = (Math.PI * 2 / 5) * i;
                    const dist = 4 + Math.random() * 8;
                    el.style.left = Math.min(95, Math.max(5, e.clientX / window.innerWidth * 100 + Math.cos(angle) * dist)) + '%';
                    el.style.top = Math.min(90, Math.max(5, e.clientY / window.innerHeight * 100 + Math.sin(angle) * dist)) + '%';
                    el.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
                    el.style.setProperty('--del', '0s');
                    el.style.setProperty('color', `rgba(255,255,255,${0.12 + Math.random() * 0.1})`);
                    el.style.fontSize = (14 + Math.random() * 10) + 'px';
                    bg.appendChild(el);
                    setTimeout(() => el.remove(), 4000);
                }, i * 80);
            }
        });

        // Formspree email subscribe
        document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const msg = document.getElementById('formMsg');
            const btn = this.querySelector('button');

            btn.disabled = true;
            btn.textContent = '...';

            try {
                const res = await fetch('https://formspree.io/f/mjgpkwby', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if (res.ok) {
                    msg.textContent = 'Mulțumim. Te anunțăm.';
                    document.getElementById('emailInput').value = '';
                } else {
                    msg.textContent = 'Eroare. Încearcă din nou.';
                }
            } catch {
                msg.textContent = 'Eroare de conexiune.';
            }

            btn.disabled = false;
            btn.textContent = 'Anunță-mă';
            setTimeout(() => { msg.textContent = ''; }, 5000);
        });
    </script>

</body>
</html>
