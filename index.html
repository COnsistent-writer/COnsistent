<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSISTENT</title>
    <meta name="description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:title" content="CONSISTENT">
    <meta property="og:description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://consistent.ro">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080808;
            --text: #ffffff;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background floating words */
        .bg-words {
            position: fixed; inset: 0;
            overflow: hidden; z-index: 0; pointer-events: none;
        }

        .bg-word {
            position: absolute;
            font-weight: 200;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
            user-select: none;
            animation: breathe var(--dur) var(--del) linear forwards;
            transition: color 0.3s, transform 0.3s, text-shadow 0.3s;
            pointer-events: all;
            cursor: default;
        }

        .bg-word:hover {
            color: rgba(255, 255, 255, 0.5) !important;
            transform: scale(1.2) !important;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
            animation-play-state: paused;
        }

        @keyframes breathe {
            0% { opacity: 0; transform: translateY(6px) scale(0.98); filter: blur(1px); }
            15% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
            75% { opacity: 1; transform: translateY(-3px) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-8px) scale(0.99); filter: blur(2px); }
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 75%);
            pointer-events: none; z-index: 1;
        }

        /* Main content — centered vertically with slight upward offset */
        .content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 24px;
            margin-top: -5vh;
        }

        .title {
            font-size: clamp(36px, 9vw, 100px); font-weight: 900;
            letter-spacing: 0.12em; line-height: 1;
            background: linear-gradient(180deg, #ffffff 20%, #4a4a4a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            opacity: 0; transform: translateY(20px);
            animation: rise 1.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .divider {
            width: 50px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            margin: 24px auto; opacity: 0; animation: expandLine 1.2s 1s ease-out forwards;
        }

        .tagline {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(16px, 2.5vw, 24px); font-weight: 400; font-style: italic;
            color: rgba(255,255,255,0.55); letter-spacing: 0.02em; line-height: 1.7;
            opacity: 0; animation: fadeUp 1.5s 1.3s ease-out forwards;
            max-width: 420px; margin: 0 auto;
            padding: 0 16px;
        }

        .coming {
            margin-top: 32px; font-size: 11px; font-weight: 300;
            letter-spacing: 0.5em; text-transform: uppercase;
            color: rgba(255,255,255,0.2); opacity: 0;
            animation: fadeUp 1.5s 1.8s ease-out forwards;
        }

        /* Highlighted word pulse */
        .bg-word.highlight {
            animation: pulse 0.5s ease-in-out infinite alternate !important;
            color: rgba(255,255,255,0.45) !important;
            text-shadow: 0 0 12px rgba(255,255,255,0.1);
            z-index: 1;
        }

        .bg-word.attracted {
            transition: left 0.8s ease-out, top 0.8s ease-out;
        }

        @keyframes pulse {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.08); }
        }

        /* Email — fixed bottom, always visible */
        .subscribe {
            position: fixed; bottom: 50px; left: 0; right: 0;
            z-index: 4; opacity: 0; text-align: center;
            padding: 0 24px;
            animation: fadeUp 1.5s 2.2s ease-out forwards;
        }

        .subscribe form {
            display: flex; gap: 0;
            max-width: 320px; margin: 0 auto;
        }

        .subscribe input[type="email"] {
            flex: 1; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-right: none;
            border-radius: 4px 0 0 4px; padding: 10px 14px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300;
            letter-spacing: 0.03em; outline: none; transition: border-color 0.3s;
            min-width: 0;
        }

        .subscribe input[type="email"]::placeholder { color: rgba(255,255,255,0.2); }
        .subscribe input[type="email"]:focus { border-color: rgba(255,255,255,0.25); }

        .subscribe button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 0 4px 4px 0;
            padding: 10px 16px; color: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }

        .subscribe button:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }

        .subscribe .msg {
            margin-top: 8px; font-size: 12px; font-weight: 300;
            color: rgba(255,255,255,0.3); min-height: 18px;
        }

        /* Footer */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 4; text-align: center; padding: 12px 16px;
            font-size: 10px; font-weight: 300; color: rgba(255,255,255,0.1);
            letter-spacing: 0.05em;
        }

        .footer a {
            color: rgba(255,255,255,0.15); text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover { color: rgba(255,255,255,0.35); }

        @keyframes rise { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes expandLine { from { width: 0; opacity: 0; } to { width: 50px; opacity: 1; } }

        /* Grain */
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 5;
        }

        /* Mobile fixes */
        @media (max-width: 600px) {
            .content { margin-top: -8vh; }
            .title { letter-spacing: 0.08em; }
            .tagline { font-size: 17px; padding: 0 12px; }
            .coming { margin-top: 20px; font-size: 10px; }
            .subscribe { bottom: 42px; }
            .subscribe form { max-width: 280px; }
            .subscribe input[type="email"] { padding: 10px 12px; font-size: 12px; }
            .subscribe button { padding: 10px 12px; font-size: 10px; }
            .footer { font-size: 9px; padding: 8px 12px; }
            .bg-word { letter-spacing: 0.1em; }
        }

        @media (max-width: 360px) {
            .title { letter-spacing: 0.05em; }
            .tagline { font-size: 15px; }
            .subscribe { bottom: 36px; }
            .subscribe form { max-width: 260px; }
        }

        /* Landscape mobile */
        @media (max-height: 500px) {
            .content { margin-top: 0; }
            .divider { margin: 12px auto; }
            .coming { margin-top: 16px; }
            .subscribe { bottom: 32px; }
        }
    </style>
</head>
<body>

    <div class="bg-words" id="bgWords"></div>
    <div class="vignette"></div>
    <canvas id="ripple" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></canvas>

    <div class="content">
        <div class="title">CONSISTENT</div>
        <div class="divider"></div>
        <div class="tagline">Cartea pe care nimeni nu ți-o dă,<br>dar pe care o cauți de ani.</div>
        <div class="coming">In curând</div>
    </div>

    <div class="subscribe">
        <form id="subscribeForm">
            <input type="email" id="emailInput" name="email" placeholder="adresa ta de email" required>
            <button type="submit">Anunță-mă</button>
        </form>
        <div class="msg" id="formMsg"></div>
    </div>

    <footer class="footer">
        &copy; 2026 CONSISTENT &nbsp;&middot;&nbsp;
        <a href="/confidentialitate.html">Confidențialitate</a> &nbsp;&middot;&nbsp;
        contact@consistent.ro
    </footer>

    <script>
        const words = [
            // Forță & acțiune
            'ridică-te', 'fă ce trebuie', 'disciplină', 'curaj', 'putere',
            'consistență', 'fapte nu vorbe', 'acțiune', 'rezistență', 'hotărâre',
            'nu mâine. azi.', 'execuție', 'persistență', 'determinare',
            // Masculinitate & caracter
            'masculinitate', 'onoare', 'caracter', 'integritate', 'coloană vertebrală',
            'fii de neclintit', 'responsabilitate', 'stăpânire de sine', 'bărbat',
            'maturitate', 'respect câștigat', 'autoritate interioară',
            // Adevăr & claritate
            'adevăr', 'fără scuze', 'oglinda', 'luciditate', 'autenticitate',
            'nu te mai minți', 'confruntare', 'alegere', 'direcție', 'scop',
            // Transformare
            'transformare', 'reconstrucție', 'libertate', 'renaștere',
            'fiecare zi contează', 'devino', 'crește', 'evoluție',
            // Provocare
            'cât mai suporți?', 'știi ce ai de făcut', 'fă-o acum',
            'nu mai fugi', 'confruntă-te', 'trăiește real',
            'tăcerea te distruge', 'alege durerea care construiește',
            'nu ești victimă', 'oprește-te din fugă', 'privește-te în ochi',
            'merită suferința?', 'cine ești de fapt?', 'ce vrei cu adevărat?',
            'fii incomod', 'spune adevărul', 'renunță la mască',
            'acceptă durerea', 'fii prezent', 'nu mai amâna',
            'ține-ți cuvântul', 'fii om de cuvânt', 'construiește zilnic',
            'fii tată', 'fii lider', 'fii mentor', 'fii exemplu',
            'trezește-te', 'luptă pentru tine', 'mergi înainte',
            'nu cere permisiune', 'asumă-ți greșelile', 'crește prin durere',
            'fii prezent acolo unde contează', 'lasă ego-ul', 'ascultă mai mult',
            'protejează ce iubești', 'construiește ceva care rămâne',
            'fii constant', 'nu perfect — consistent', 'zi de zi',
            'un pas', 'începe acum', 'termină ce ai început',
            // Citate celebre & idei
            'suferința acceptată transformă',
            'cine nu-și asumă nimic nu devine nimic',
            'ordinea bate talentul',
            'fă azi ce alții nu vor face',
            'frica e busola — mergi spre ea',
            'nu căuta confort, caută sens',
            'cel mai greu adversar ești tu',
            'tăcerea unui bărbat vorbește',
            'caracterul se construiește în întuneric',
            'ai grijă ce tolerezi — înveți oamenii cum să te trateze',
            'durerea e inevitabilă, suferința e opțională',
            'fii omul pe care îl cauți',
            'nu conta pe motivație, contează pe obișnuință',
            'respectul se câștigă, nu se cere',
            'un om fără scop e un om pierdut',
            'vorbele conving, exemplul atrage',
            'ceea ce nu te confruntă nu te schimbă',
            'nu fugi de tine — e singurul loc unde trebuie să ajungi',
            'disciplina e libertate',
            'cuvântul dat e contract cu tine însuți',
            'lasă rezultatele să vorbească',
            'greutatea pe care o eviți devine greutatea care te doboară',
            'fii primul care recunoaște când greșește',
            'un bărbat adevărat construiește, nu distruge',
            'simplitatea e sofisticarea supremă',
            'în liniște se nasc cele mai puternice decizii',
            'caută adevărul chiar când doare',
            'nu aștepta momentul perfect — creează-l',
            'fii genul de om pe care l-ai fi admirat la 15 ani',
            'ceea ce faci în fiecare zi contează mai mult decât ce faci din când în când',
            'suferința neasumată devine otravă',
            'fii atent la ce construiești când nimeni nu se uită',
            'nu poți schimba direcția vântului dar poți ajusta velele',
            'curajul nu e absența fricii ci alegerea de a acționa',
            'fii ancorat în valori nu în emoții',
            'singurătatea aleasă e libertate',
            'renunță la ce nu te crește',
            'un om care nu citește nu are niciun avantaj față de unul care nu știe să citească'
        ];

        const bg = document.getElementById('bgWords');
        const isMobile = window.innerWidth < 600;

        // Grid-based placement — prevents overlap
        const usedZones = new Set();
        const GRID_COLS = isMobile ? 6 : 10;
        const GRID_ROWS = isMobile ? 8 : 10;

        function getOpenZone() {
            // Avoid center zone (where title/tagline live)
            const centerCols = isMobile ? [2,3] : [3,4,5,6];
            const centerRows = isMobile ? [3,4] : [3,4,5,6];
            let attempts = 0;
            while (attempts < 30) {
                const col = Math.floor(Math.random() * GRID_COLS);
                const row = Math.floor(Math.random() * GRID_ROWS);
                const key = col + ',' + row;
                const inCenter = centerCols.includes(col) && centerRows.includes(row);
                if (!usedZones.has(key) && !inCenter) {
                    usedZones.add(key);
                    setTimeout(() => usedZones.delete(key), 2500);
                    return {
                        left: (col / GRID_COLS * 90 + 5 + Math.random() * 4) ,
                        top: (row / GRID_ROWS * 85 + 5 + Math.random() * 4)
                    };
                }
                attempts++;
            }
            return null;
        }

        function spawnWord() {
            const pos = getOpenZone();
            if (!pos) return;

            const word = words[Math.floor(Math.random() * words.length)];
            const el = document.createElement('div');
            el.className = 'bg-word';
            el.textContent = word;
            el.style.left = pos.left + '%';
            el.style.top = pos.top + '%';

            const dur = 3 + Math.random() * 5;
            el.style.setProperty('--dur', dur + 's');
            el.style.setProperty('--del', '0s');
            el.style.setProperty('color', `rgba(255,255,255,${0.07 + Math.random() * 0.08})`);
            el.style.fontSize = (isMobile ? 10 + Math.random() * 10 : 11 + Math.random() * 16) + 'px';

            // Click/tap on a word — highlight + attract others
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (el.classList.contains('highlight')) return;

                el.classList.add('highlight');
                el.style.animationPlayState = 'running';

                // Attract nearby words
                const rect = el.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;

                // Spawn 3 new words that drift toward this one
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const child = document.createElement('div');
                        child.className = 'bg-word attracted';
                        child.textContent = words[Math.floor(Math.random() * words.length)];
                        const angle = (Math.PI * 2 / 3) * i + Math.random() * 0.5;
                        const dist = 12 + Math.random() * 8;
                        child.style.left = (cx / window.innerWidth * 100 + Math.cos(angle) * dist) + '%';
                        child.style.top = (cy / window.innerHeight * 100 + Math.sin(angle) * dist) + '%';
                        child.style.setProperty('--dur', '4s');
                        child.style.setProperty('--del', '0s');
                        child.style.setProperty('color', `rgba(255,255,255,${0.1 + Math.random() * 0.08})`);
                        child.style.fontSize = (11 + Math.random() * 8) + 'px';
                        bg.appendChild(child);

                        // Drift toward parent
                        requestAnimationFrame(() => {
                            const drift = 3 + Math.random() * 3;
                            child.style.left = (cx / window.innerWidth * 100 + Math.cos(angle) * drift) + '%';
                            child.style.top = (cy / window.innerHeight * 100 + Math.sin(angle) * drift) + '%';
                        });

                        setTimeout(() => child.remove(), 4000);
                    }, i * 200);
                }

                // Remove highlight after 3s
                setTimeout(() => {
                    el.classList.remove('highlight');
                }, 3000);
            });

            bg.appendChild(el);
            setTimeout(() => { el.remove(); }, dur * 1000);
        }

        const initialCount = isMobile ? 15 : 30;
        const spawnRate = isMobile ? 500 : 350;

        for (let i = 0; i < initialCount; i++) setTimeout(spawnWord, Math.random() * 2000);
        setInterval(spawnWord, spawnRate);

        // Ripple effect (desktop only)
        const canvas = document.getElementById('ripple');
        const ctx = canvas.getContext('2d');
        let ripples = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 0.06 });
                if (ripples.length > 6) ripples.shift();
            });
        }

        function drawRipples() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples = ripples.filter(rip => rip.alpha > 0.001);
            ripples.forEach(rip => {
                rip.r += 1.5;
                rip.alpha *= 0.97;
                ctx.beginPath();
                ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,255,255,${rip.alpha})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            });
            requestAnimationFrame(drawRipples);
        }
        drawRipples();

        // Click on empty space — spawn a single word there
        document.addEventListener('click', (e) => {
            if (e.target.closest('.subscribe') || e.target.closest('.footer') || e.target.closest('a') || e.target.classList.contains('bg-word')) return;
            const el = document.createElement('div');
            el.className = 'bg-word';
            el.textContent = words[Math.floor(Math.random() * words.length)];
            el.style.left = (e.clientX / window.innerWidth * 100) + '%';
            el.style.top = (e.clientY / window.innerHeight * 100) + '%';
            el.style.setProperty('--dur', '4s');
            el.style.setProperty('--del', '0s');
            el.style.setProperty('color', 'rgba(255,255,255,0.2)');
            el.style.fontSize = '16px';
            bg.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        });

        // Formspree email subscribe
        document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const msg = document.getElementById('formMsg');
            const btn = this.querySelector('button');

            btn.disabled = true;
            btn.textContent = '...';

            try {
                const res = await fetch('https://formspree.io/f/mjgpkwby', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if (res.ok) {
                    msg.textContent = 'Mulțumim. Te anunțăm.';
                    document.getElementById('emailInput').value = '';
                } else {
                    msg.textContent = 'Eroare. Încearcă din nou.';
                }
            } catch {
                msg.textContent = 'Eroare de conexiune.';
            }

            btn.disabled = false;
            btn.textContent = 'Anunță-mă';
            setTimeout(() => { msg.textContent = ''; }, 5000);
        });
    </script>

</body>
</html>
