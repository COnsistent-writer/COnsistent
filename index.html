<html lang="ro">
<head>

    <meta property="og:title" content="CONSISTENT">
    <meta property="og:description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://consistent.ro">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root { --bg: #080808; }

        html, body { width: 100%; height: 100dvh; height: 100vh; overflow: hidden; }
        @supports (height: 100dvh) { html, body { height: 100dvh; } }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            -webkit-user-select: none; user-select: none;
        }

        .bg-words { position: fixed; inset: 0; overflow: hidden; z-index: 0; }

        .bg-word {
            position: absolute; font-weight: 200;
            letter-spacing: 0.15em; text-transform: uppercase;
            white-space: normal; max-width: 45vw;
            line-height: 1.4; pointer-events: all; cursor: default;
            opacity: 0;
            transition: color 0.4s, text-shadow 0.4s;
        }

        .bg-word:hover {
            filter: brightness(1.8) !important;
            text-shadow: 0 0 20px currentColor;
            transform: scale(1.04);
            transition: filter 0.3s, text-shadow 0.3s, transform 0.3s;
        }

        .bg-word.highlight {
            animation: pulse 0.4s ease-in-out infinite alternate !important;
            filter: brightness(2) !important;
            text-shadow: 0 0 22px currentColor;
        }

        @keyframes pulse {
            from { opacity: 0.85; } to { opacity: 1; }
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 25%, var(--bg) 72%);
            pointer-events: none; z-index: 1;
        }

        .content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 24px; margin-top: -2vh;
            pointer-events: none;
        }

        .title {
            font-size: clamp(36px, min(9vw, 12vh), 100px); font-weight: 900;
            letter-spacing: 0.12em; line-height: 1;
            background: linear-gradient(135deg, #d4af69 0%, #8b7355 25%, #c9b896 50%, #6b5b45 75%, #d4af69 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            opacity: 0; transform: translateY(20px);
            animation: rise 1.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards, titleShift 10s 2s ease-in-out infinite;
        }

        @keyframes titleShift {
            0%, 100% { background-position: 0% 50%; }
            33% { background-position: 100% 50%; }
            66% { background-position: 50% 100%; }
        }

        .divider { display: none; }

        .tagline {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(15px, min(2.8vw, 3.5vh), 24px); font-weight: 400;
            color: rgba(255,255,255,0.5); letter-spacing: 0.02em; line-height: 1.7;
            opacity: 0; animation: fadeUp 1.5s 1.2s ease-out forwards;
            max-width: 480px; margin: 12px auto 0; padding: 0 16px;
            min-height: 3.4em;
        }
        .tagline .tl-word {
            display: inline-block;
            white-space: nowrap;
        }
        .tagline .tl-char {
            display: inline-block;
            transition: opacity 0.4s ease, transform 0.4s ease, filter 0.4s ease;
        }
        .tagline .tl-char.out {
            opacity: 0;
            transform: translateY(-8px);
            filter: blur(4px);
        }
        .tagline .tl-char.in {
            opacity: 0;
            transform: translateY(8px);
            filter: blur(4px);
        }

        .center-email {
            margin-top: 10px; opacity: 0;
            animation: fadeUp 1.5s 1.5s ease-out forwards;
        }

        .center-email a {
            font-size: 11px; font-weight: 300;
            letter-spacing: 0.15em; color: rgba(255,255,255,0.15);
            text-decoration: none; transition: color 0.3s;
        }

        .center-email a:hover { color: rgba(212,175,105,0.4); }

        .coming {
            margin-top: 12px; font-size: clamp(14px, min(3vw, 3.5vh), 26px); font-weight: 300;
            letter-spacing: 0.35em; text-transform: uppercase;
            color: rgba(212,175,105,0.75); opacity: 0;
            animation: fadeUp 1.5s 0.8s ease-out forwards, breatheText 3s 2.5s ease-in-out infinite;
        }

        @keyframes breatheText {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.06); opacity: 0.7; }
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 4; text-align: center;
            background: linear-gradient(180deg, transparent 0%, rgba(8,8,8,0.85) 25%, rgba(8,8,8,0.97) 100%);
            padding: 20px 24px 12px;
            max-height: 45vh; overflow-y: auto;
            opacity: 0;
            animation: fadeUp 1.5s 2s ease-out forwards;
        }

        #subscribeForm {
            display: flex; gap: 0;
            max-width: 340px; margin: 0 auto;
        }

        #subscribeForm {
            position: relative; z-index: 3;
        }

        #subscribeForm input[type="email"] {
            flex: 1; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(212,175,105,0.25); border-right: none;
            border-radius: 3px 0 0 3px; padding: 12px 16px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 300;
            letter-spacing: 0.03em; outline: none; transition: all 0.3s;
            min-width: 0; -webkit-user-select: text; user-select: text;
        }

        #subscribeForm input[type="email"]::placeholder { color: rgba(255,255,255,0.3); }
        #subscribeForm input[type="email"]:focus {
            border-color: rgba(212,175,105,0.5);
            background: rgba(212,175,105,0.06);
            box-shadow: 0 0 16px rgba(212,175,105,0.1), inset 0 0 8px rgba(212,175,105,0.03);
        }

        #subscribeForm button {
            background: rgba(212,175,105,0.12);
            border: 1px solid rgba(212,175,105,0.25); border-radius: 0 3px 3px 0;
            padding: 12px 20px; color: rgba(212,175,105,0.7);
            font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }

        #subscribeForm button:hover { background: rgba(212,175,105,0.22); color: rgba(212,175,105,0.9); }

        #formMsg {
            font-size: 12px; font-weight: 300;
            color: rgba(212,175,105,0.5); min-height: 14px;
            margin-top: 4px; margin-bottom: 2px; text-align: center;
            position: relative; z-index: 3;
        }

        .bottom-bar .countdown {
            display: flex; justify-content: center; gap: 16px;
            margin-bottom: 10px;
        }

        .countdown .cd-block { text-align: center; }

        .countdown .cd-num {
            font-size: 22px; font-weight: 700;
            color: rgba(212,175,105,0.45);
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            display: inline-block;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .countdown .cd-num.flip {
            animation: flipNum 0.4s ease;
        }
        @keyframes flipNum {
            0% { transform: translateY(0); opacity: 1; }
            40% { transform: translateY(-6px); opacity: 0.3; }
            60% { transform: translateY(4px); opacity: 0.3; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .countdown .cd-label {
            font-size: 8px; font-weight: 300;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.2em; text-transform: uppercase;
            margin-top: 2px;
        }

        .countdown .cd-sep {
            font-size: 18px; font-weight: 200;
            color: rgba(212,175,105,0.15);
            align-self: flex-start; padding-top: 2px;
        }

        .bottom-bar .letter-link {
            display: inline-block;
            font-size: 13px; font-weight: 300;
            color: rgba(212,175,105,0.55);
            text-decoration: none; letter-spacing: 0.08em;
            padding: 8px 20px;
            border: 1px solid rgba(212,175,105,0.2);
            border-radius: 4px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .bottom-bar .letter-link:hover {
            color: rgba(212,175,105,0.8);
            border-color: rgba(212,175,105,0.4);
            background: rgba(212,175,105,0.06);
        }

        .bottom-bar .teaser {
            margin: 6px 0 8px; font-size: 13px; font-weight: 300;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: rgba(212,175,105,0.55);
        }

        .share-bar {
            display: flex; justify-content: center; gap: 18px;
            margin: 10px 0 8px;
        }

        .share-bar a {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.35);
            text-decoration: none; font-size: 16px;
            transition: all 0.3s;
        }

        .share-bar a:hover {
            border-color: rgba(212,175,105,0.4);
            color: rgba(212,175,105,0.7);
            background: rgba(212,175,105,0.08);
            transform: scale(1.1);
        }

        .share-bar svg { width: 16px; height: 16px; fill: currentColor; }

        .bottom-bar .footer-line {
            font-size: 13px; font-weight: 300;
            color: rgba(255,255,255,0.35); letter-spacing: 0.04em;
        }

        .bottom-bar .footer-line a {
            color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.3s;
        }

        .bottom-bar .footer-line a:hover { color: rgba(212,175,105,0.7); }

        @keyframes rise { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes expandLine { from { width: 0; opacity: 0; } to { width: 50px; opacity: 1; } }

        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 5;
        }

        /* Desktop portrait / narrow window (601-900px) */
        @media (max-width: 900px) and (min-width: 601px) {
            .content { margin-top: -1vh; }
            .bottom-bar { padding: 18px 20px 10px; }
            #subscribeForm { max-width: 300px; }
            .share-bar { gap: 12px; margin: 6px 0 6px; }
            .share-bar a { width: 32px; height: 32px; }
            .bottom-bar .teaser { font-size: 12px; margin: 4px 0 4px; }
            .bottom-bar .footer-line { font-size: 12px; }
            .bg-word { max-width: 35vw; }
        }

        /* Portrait orientation — tall and narrow */
        @media (orientation: portrait) and (min-width: 601px) {
            .content { margin-top: 0; }
            .title { font-size: clamp(36px, 7vw, 72px); }
            .tagline { font-size: clamp(15px, 2.2vw, 20px); }
            .coming { font-size: clamp(14px, 2.2vw, 20px); }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .content { margin-top: -4vh; }
            .title { letter-spacing: 0.08em; }
            .tagline { font-size: 16px; padding: 0 12px; }
            .coming { margin-top: 8px; font-size: 14px; }
            .bottom-bar { padding: 20px 16px 8px; }
            #subscribeForm { max-width: 280px; }
            #subscribeForm input[type="email"] { padding: 10px 12px; font-size: 12px; }
            #subscribeForm button { padding: 10px 12px; font-size: 10px; }
            .countdown .cd-num { font-size: 18px; }
            .countdown .cd-sep { font-size: 14px; }
            .countdown { gap: 10px; margin-bottom: 6px; }
            .bottom-bar .letter-link { font-size: 12px; padding: 7px 16px; }
            .bottom-bar .teaser { font-size: 11px; margin: 4px 0 4px; }
            .bottom-bar .footer-line { font-size: 11px; }
            .share-bar { gap: 12px; margin: 6px 0 6px; }
            .share-bar a { width: 32px; height: 32px; }
            .bg-word { letter-spacing: 0.08em; max-width: 38vw; line-height: 1.3; }
        }

        @media (max-width: 360px) {
            .title { letter-spacing: 0.05em; }
            .tagline { font-size: 15px; }
            .bottom-bar { padding: 16px 12px 6px; }
            #subscribeForm { max-width: 260px; }
        }

        /* Short screens — landscape or small height */
        @media (max-height: 600px) {
            .content { margin-top: 0; }
            .coming { margin-top: 6px; }
            .tagline { min-height: 2.4em; }
            .bottom-bar { padding: 14px 16px 6px; }
            .bottom-bar .letter-link { padding: 5px 14px; font-size: 11px; margin-bottom: 4px; }
            .bottom-bar .teaser { font-size: 11px; margin: 2px 0 2px; }
            .countdown { gap: 8px; margin-bottom: 4px; }
            .countdown .cd-num { font-size: 16px; }
            .countdown .cd-label { font-size: 7px; }
            .share-bar { gap: 10px; margin: 4px 0 4px; }
            .share-bar a { width: 28px; height: 28px; font-size: 13px; }
            .share-bar svg { width: 13px; height: 13px; }
            .bottom-bar .footer-line { font-size: 10px; }
            #subscribeForm input[type="email"] { padding: 8px 10px; font-size: 11px; }
            #subscribeForm button { padding: 8px 10px; font-size: 9px; }
        }

        /* Very short (landscape phone) */
        @media (max-height: 420px) {
            .coming { display: none; }
            .tagline { display: none; }
            .content { margin-top: 0; }
            .bottom-bar .teaser { display: none; }
            .share-bar { display: none; }
        }

        /* iPhone fix — safe area inset for notch/home bar */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-bar { padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>

        const bg = document.getElementById('bgWords');

        const isNarrowDesktop = !isMobile && window.innerWidth < 900;
        const usedZones = new Set();
        const COLS = isMobile ? 5 : isNarrowDesktop ? 6 : 8;
        const ROWS = isMobile ? 7 : isNarrowDesktop ? 8 : 8;
        const centerCols = isMobile ? [1,2,3] : isNarrowDesktop ? [1,2,3,4] : [2,3,4,5];
        const centerRows = isMobile ? [2,3,4] : isNarrowDesktop ? [2,3,4,5] : [2,3,4,5];

        function getZone() {
            // Collect all available zones (not in center, not recently used)
            const available = [];
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    if (centerCols.includes(c) && centerRows.includes(r)) continue;
                    const k = c+','+r;
                    if (!usedZones.has(k)) available.push({ c, r, k });
                }
            }

            // If all zones are taken, force-clear oldest and pick random
            if (available.length === 0) {
                const keys = Array.from(usedZones);
                // Clear half the zones to free up space
                keys.slice(0, Math.ceil(keys.length / 2)).forEach(k => usedZones.delete(k));
                return getZone();
            }

            const pick = available[Math.floor(Math.random() * available.length)];
            usedZones.add(pick.k);
            setTimeout(() => usedZones.delete(pick.k), 4000);
            return {
                left: Math.min(pick.c / COLS * 82 + 5 + Math.random() * 6, 84),
                top: Math.min(pick.r / ROWS * 76 + 5 + Math.random() * 6, 80)
            };
        }

        // Smooth JS animation instead of CSS keyframes — full control
        function animateWord(el, dur, startX, startY) {
            const dx = (Math.random() - 0.5) * 80;
            const dy = (Math.random() - 0.5) * 50;
            const start = performance.now();

            function frame(now) {
                const t = Math.min((now - start) / (dur * 1000), 1);

                // Smooth fade: in 0-10%, visible 10-70%, fade 70-100%
                const maxO = parseFloat(el.dataset.maxOpacity) || 0.25;
                let opacity;
                if (t < 0.1) opacity = (t / 0.1) * maxO;
                else if (t < 0.7) opacity = maxO;
                else opacity = (1 - ((t - 0.7) / 0.3)) * maxO;

                // Blur on edges
                const blur = t < 0.08 ? (1 - t/0.08) * 2 : t > 0.85 ? ((t-0.85)/0.15) * 2.5 : 0;

                // Drift
                const x = startX + dx * t;
                const y = startY + dy * t;

                el.style.opacity = opacity;
                el.style.filter = blur > 0.1 ? `blur(${blur}px)` : 'none';
                el.style.left = x + '%';
                el.style.top = y + '%';

                if (t < 1 && el.parentNode) {
                    requestAnimationFrame(frame);
                } else {
                    // Graceful remove with final fade
                    el.style.transition = 'opacity 0.5s';
                    el.style.opacity = 0;
                    setTimeout(() => el.remove(), 500);
                }
            }
            requestAnimationFrame(frame);
        }

        const tagEl = document.getElementById('tagline');

        function renderTagline(text, startClass) {
            tagEl.innerHTML = '';

            words.forEach((word, wi) => {
                const wordWrap = document.createElement('span');

                tagEl.appendChild(wordWrap);
                // Add space between words (regular space, allows line break here)
                if (wi < words.length - 1) {
                    const space = document.createElement('span');
                    space.className = 'tl-char' + (startClass ? ' ' + startClass : '');
                    space.innerHTML = '&nbsp;';
                    space.style.transitionDelay = (charIndex * 18) + 'ms';
                    tagEl.appendChild(space);
                    charIndex++;

            });
        }

        function showTagline() {
            const text = taglines[tIdx % taglines.length];
            // Render with .in class (hidden, below)
            renderTagline(text, 'in');
            // Force reflow then remove .in to trigger enter
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    tagEl.querySelectorAll('.tl-char').forEach(c => c.classList.remove('in'));
                });

        function hideTagline(cb) {
            const chars = tagEl.querySelectorAll('.tl-char');
            if (chars.length === 0) { cb(); return; }
            chars.forEach(c => c.classList.add('out'));
            // Wait for last char to finish
            const totalTime = chars.length * 18 + 400;
            setTimeout(cb, totalTime);

        function cycleTagline() {
            hideTagline(() => {
                tIdx++;

        // ═══════════════════════════════════════════
        // EFFECT 1: GRAVITY WELL — words drift toward cursor
        // ═══════════════════════════════════════════
        if (!isMobile) {
            let mx = window.innerWidth / 2, my = window.innerHeight / 2;
            let mSpeed = 0, pmx = mx, pmy = my;

            document.addEventListener('mousemove', e => {
                pmx = mx; pmy = my;
                mx = e.clientX; my = e.clientY;
                mSpeed = Math.hypot(mx - pmx, my - pmy);
            });

            setInterval(() => {
                const words = document.querySelectorAll('.bg-word');
                words.forEach(w => {
                    const r = w.getBoundingClientRect();

                    const wx = r.left + r.width / 2;
                    const wy = r.top + r.height / 2;
                    const dx = mx - wx, dy = my - wy;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 15 || dist > 500) return;

                    // Attract when slow, repel when fast
                    const force = mSpeed > 30
                        ? -0.15 / (dist * 0.05)  // repel
                        : 0.08 / (dist * 0.08);   // attract

                    const ox = parseFloat(w.style.left) || 0;
                    const oy = parseFloat(w.style.top) || 0;
                    w.style.left = (ox + (dx / dist) * force) + '%';
                    w.style.top = (oy + (dy / dist) * force) + '%';
                });
                mSpeed *= 0.9; // decay
            }, 50);
        }

        // ═══════════════════════════════════════════
        // EFFECT 2: THERMAL HEATMAP — cursor leaves warmth
        // ═══════════════════════════════════════════
        const heatCanvas = document.getElementById('heatmap');
        const hctx = heatCanvas.getContext('2d');
        heatCanvas.width = window.innerWidth;

            heatCanvas.width = window.innerWidth;
            heatCanvas.height = window.innerHeight;
        });

        {
            let hx = 0, hy = 0, hSpeed = 0, hpx = 0, hpy = 0;
            const heatTrail = [];

            function addHeat(x, y, speed) {
                const intensity = Math.min(speed * 0.008, 0.4);
                if (intensity > 0.01) {
                    heatTrail.push({
                        x: x, y: y,
                        r: 30 + speed * 0.8,
                        a: intensity,
                        life: 1.0,
                        hue: Math.min(speed * 0.3, 40)
                    });
                    if (heatTrail.length > 80) heatTrail.shift();
                }
            }

            // Desktop: mouse trail
            if (!isMobile) {
                document.addEventListener('mousemove', e => {
                    hSpeed = Math.hypot(e.clientX - hpx, e.clientY - hpy);
                    hpx = hx; hpy = hy;
                    hx = e.clientX; hy = e.clientY;
                    addHeat(hx, hy, hSpeed);
                });
            }

            // Mobile: touch — glow where you touch and drag
            document.addEventListener('touchstart', e => {
                const t = e.touches[0];
                hpx = t.clientX; hpy = t.clientY;
                addHeat(t.clientX, t.clientY, 40); // initial touch = warm spot
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                const t = e.touches[0];
                const speed = Math.hypot(t.clientX - hpx, t.clientY - hpy);
                hpx = t.clientX; hpy = t.clientY;
                addHeat(t.clientX, t.clientY, speed);
            }, { passive: true });

            (function heatLoop() {
                hctx.fillStyle = 'rgba(0,0,0,0.06)';
                hctx.fillRect(0, 0, heatCanvas.width, heatCanvas.height);

                for (let i = heatTrail.length - 1; i >= 0; i--) {
                    const p = heatTrail[i];
                    p.life -= 0.012;
                    p.r += 0.3;

                    if (p.life <= 0) {
                        heatTrail.splice(i, 1);
                        continue;
                    }

                    const alpha = p.a * p.life * p.life;
                    const warm = p.hue;
                    const grad = hctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                    grad.addColorStop(0, `rgba(${180 + warm},${100 + warm * 0.5},40,${alpha})`);
                    grad.addColorStop(0.4, `rgba(${160 + warm * 0.5},${90},30,${alpha * 0.4})`);
                    grad.addColorStop(1, 'rgba(100,60,20,0)');
                    hctx.fillStyle = grad;
                    hctx.beginPath();
                    hctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    hctx.fill();
                }

                requestAnimationFrame(heatLoop);
            })();
        }

        // ═══════════════════════════════════════════
        // EFFECT 3: SEISMOGRAPH LINE — idle heartbeat, reactive tremor
        // ═══════════════════════════════════════════
        const sCanvas = document.getElementById('seismo');
        const sctx = sCanvas.getContext('2d');
        sCanvas.width = window.innerWidth;
        sCanvas.height = 60;
        window.addEventListener('resize', () => { sCanvas.width = window.innerWidth; sCanvas.height = 60; });

        const sPoints = new Float32Array(Math.ceil(window.innerWidth / 2));
        let sMouseSpeed = 0, sTime = 0;

        if (!isMobile) {
            let spx = 0, spy = 0;
            document.addEventListener('mousemove', e => {
                sMouseSpeed = Math.hypot(e.clientX - spx, e.clientY - spy);
                spx = e.clientX; spy = e.clientY;
            });
            document.addEventListener('click', () => { sMouseSpeed = 150; }); // click = spike
        }

        (function seismoLoop() {
            sTime += 0.03;
            sMouseSpeed *= 0.92; // decay

            // Shift points left
            for (let i = 0; i < sPoints.length - 1; i++) sPoints[i] = sPoints[i + 1];

            // New point: heartbeat sine + mouse tremor
            const heartbeat = Math.sin(sTime * 2) * 3 + Math.sin(sTime * 5.7) * 1.5;
            const tremor = (Math.random() - 0.5) * Math.min(sMouseSpeed * 0.4, 25);
            sPoints[sPoints.length - 1] = heartbeat + tremor;

            sctx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            sctx.beginPath();
            sctx.moveTo(0, 30 + sPoints[0]);
            for (let i = 1; i < sPoints.length; i++) {
                sctx.lineTo(i * 2, 30 + sPoints[i]);
            }
            sctx.strokeStyle = 'rgba(212,175,105,0.07)';
            sctx.lineWidth = 1;
            sctx.stroke();

            requestAnimationFrame(seismoLoop);
        })();

        // ═══════════════════════════════════════════
        // EFFECT 5: CHROMATIC ABERRATION on title by cursor speed
        // Uses filter:drop-shadow since text-shadow is invisible on gradient-clipped text
        // ═══════════════════════════════════════════
        if (!isMobile) {
            const titleEl = document.querySelector('.title');
            let caPx = 0, caPy = 0, caSpeed = 0;

            document.addEventListener('mousemove', e => {
                caSpeed = Math.hypot(e.clientX - caPx, e.clientY - caPy);
                caPx = e.clientX; caPy = e.clientY;
            });

            (function caLoop() {
                caSpeed *= 0.88;
                const shift = Math.min(caSpeed * 0.1, 4); // max 4px

                if (shift > 0.3) {
                    titleEl.style.filter =
                        `drop-shadow(${-shift}px 0 0 rgba(255,50,50,0.12)) drop-shadow(${shift}px 0 0 rgba(50,50,255,0.12))`;
                } else {
                    titleEl.style.filter = 'none';
                }
                requestAnimationFrame(caLoop);
            })();
        }
    </script>

</body>
