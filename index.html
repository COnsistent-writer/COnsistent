<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSISTENT</title>
    <meta name="description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:title" content="CONSISTENT">
    <meta property="og:description" content="O carte despre bărbatul care alege să nu mai mintă. În curând.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://consistent.ro">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root { --bg: #080808; }

        html, body { width: 100%; height: 100%; overflow: hidden; }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            -webkit-user-select: none; user-select: none;
        }

        .bg-words { position: fixed; inset: 0; overflow: hidden; z-index: 0; }

        .bg-word {
            position: absolute; font-weight: 200;
            letter-spacing: 0.15em; text-transform: uppercase;
            white-space: normal; max-width: 45vw;
            line-height: 1.4; pointer-events: all; cursor: default;
            opacity: 0;
            transition: color 0.4s, text-shadow 0.4s;
        }

        .bg-word:hover {
            color: rgba(212,175,105,0.55) !important;
            text-shadow: 0 0 18px rgba(212,175,105,0.12);
        }

        .bg-word.highlight {
            animation: pulse 0.4s ease-in-out infinite alternate !important;
            color: rgba(212,175,105,0.5) !important;
            text-shadow: 0 0 22px rgba(212,175,105,0.18);
        }

        @keyframes pulse {
            from { opacity: 0.85; } to { opacity: 1; }
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 25%, var(--bg) 72%);
            pointer-events: none; z-index: 1;
        }

        .content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 24px; margin-top: -4vh;
            pointer-events: none;
        }

        .title {
            font-size: clamp(36px, 9vw, 100px); font-weight: 900;
            letter-spacing: 0.12em; line-height: 1;
            background: linear-gradient(135deg, #d4af69 0%, #8b7355 25%, #c9b896 50%, #6b5b45 75%, #d4af69 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            opacity: 0; transform: translateY(20px);
            animation: rise 1.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards, titleShift 10s 2s ease-in-out infinite;
        }

        @keyframes titleShift {
            0%, 100% { background-position: 0% 50%; }
            33% { background-position: 100% 50%; }
            66% { background-position: 50% 100%; }
        }

        .divider { display: none; }

        .tagline {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(15px, 2.2vw, 21px); font-weight: 400; font-style: italic;
            color: rgba(255,255,255,0.4); letter-spacing: 0.02em; line-height: 1.7;
            opacity: 0; animation: fadeUp 1.5s 1.2s ease-out forwards;
            max-width: 400px; margin: 10px auto 0; padding: 0 16px;
        }

        .coming {
            margin-top: 14px; font-size: clamp(16px, 2.5vw, 22px); font-weight: 300;
            letter-spacing: 0.35em; text-transform: uppercase;
            color: rgba(212,175,105,0.35); opacity: 0;
            animation: fadeUp 1.5s 0.8s ease-out forwards;
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 4; text-align: center;
            background: linear-gradient(180deg, transparent 0%, rgba(8,8,8,0.85) 25%, rgba(8,8,8,0.97) 100%);
            padding: 36px 24px 14px;
            opacity: 0;
            animation: fadeUp 1.5s 2s ease-out forwards;
        }

        .bottom-bar form {
            display: flex; gap: 0;
            max-width: 340px; margin: 0 auto;
        }

        .bottom-bar input[type="email"] {
            flex: 1; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,175,105,0.1); border-right: none;
            border-radius: 3px 0 0 3px; padding: 11px 16px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300;
            letter-spacing: 0.03em; outline: none; transition: border-color 0.3s;
            min-width: 0; -webkit-user-select: text; user-select: text;
        }

        .bottom-bar input[type="email"]::placeholder { color: rgba(255,255,255,0.15); }
        .bottom-bar input[type="email"]:focus { border-color: rgba(212,175,105,0.3); }

        .bottom-bar button {
            background: rgba(212,175,105,0.08);
            border: 1px solid rgba(212,175,105,0.12); border-radius: 0 3px 3px 0;
            padding: 11px 18px; color: rgba(212,175,105,0.45);
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }

        .bottom-bar button:hover { background: rgba(212,175,105,0.16); color: rgba(212,175,105,0.75); }

        .bottom-bar .msg {
            font-size: 11px; font-weight: 300;
            color: rgba(212,175,105,0.25); min-height: 14px;
            margin-top: 4px;
        }

        .bottom-bar .teaser {
            margin: 8px 0 8px; font-size: 11px; font-weight: 300;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: rgba(212,175,105,0.2);
        }

        .bottom-bar .footer-line {
            font-size: 11px; font-weight: 300;
            color: rgba(255,255,255,0.12); letter-spacing: 0.04em;
        }

        .bottom-bar .footer-line a {
            color: rgba(255,255,255,0.16); text-decoration: none; transition: color 0.3s;
        }

        .bottom-bar .footer-line a:hover { color: rgba(212,175,105,0.35); }

        @keyframes rise { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes expandLine { from { width: 0; opacity: 0; } to { width: 50px; opacity: 1; } }

        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 5;
        }

        @media (max-width: 600px) {
            .content { margin-top: -6vh; }
            .title { letter-spacing: 0.08em; }
            .tagline { font-size: 17px; padding: 0 12px; }
            .coming { margin-top: 10px; font-size: 14px; }
            .bottom-bar { padding: 28px 16px 10px; }
            .bottom-bar form { max-width: 280px; }
            .bottom-bar input[type="email"] { padding: 10px 12px; font-size: 12px; }
            .bottom-bar button { padding: 10px 12px; font-size: 10px; }
            .bottom-bar .teaser { font-size: 10px; margin: 6px 0 6px; }
            .bottom-bar .footer-line { font-size: 10px; }
            .coming { font-size: 14px; }
            .bg-word { letter-spacing: 0.08em; max-width: 38vw; line-height: 1.3; }
        }

        @media (max-width: 360px) {
            .title { letter-spacing: 0.05em; }
            .tagline { font-size: 15px; }
            .bottom-bar { padding: 24px 12px 8px; }
            .bottom-bar form { max-width: 260px; }
        }

        @media (max-height: 500px) {
            .content { margin-top: 0; }
            .divider { margin: 12px auto; }
            .coming { margin-top: 10px; }
            .bottom-bar { padding: 20px 16px 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-words" id="bgWords"></div>
    <div class="vignette"></div>
    <canvas id="ripple" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></canvas>

    <div class="content">
        <div class="title">CONSISTENT</div>
        <div class="divider"></div>
        <div class="coming">În curând</div>
        <div class="tagline">Cartea de care ai nevoie,<br>nu cea pe care o vrei.</div>
    </div>

    <div class="bottom-bar">
        <form id="subscribeForm">
            <input type="email" id="emailInput" name="email" placeholder="adresa ta de email" required>
            <button type="submit">Anunță-mă</button>
        </form>
        <div class="msg" id="formMsg"></div>
        <div class="teaser">50 de capitole. Un singur adevăr.</div>
        <div class="footer-line">
            <a href="/scrisoare.html" style="color:rgba(212,175,105,0.2);">Scrie-ți o scrisoare</a> &nbsp;&middot;&nbsp;
            &copy; 2026 CONSISTENT &nbsp;&middot;&nbsp;
            <a href="/confidentialitate.html">COnfidențialitate</a> &nbsp;&middot;&nbsp;
            contact@consistent.ro
        </div>
    </div>

    <script>
        const themes = {
            'COnfuzie': ['pierdut între modele', 'moartea sufletului', 'amorțeală'],
            'COndiționare': ['sparge tiparul', 'gândește singur', 'cine ți-a ales valorile?'],
            'COnștiință': ['trezește-te', 'oglinda nu minte', 'ascultă liniștea'],
            'COnfruntare': ['nu mai fugi', 'acceptă durerea', 'mergi spre disconfort'],
            'COnsistență': ['zi de zi', 'fapte nu vorbe', 'ține-ți cuvântul'],
            'COnstruit': ['construiește zilnic', 'fiecare zi contează', 'termină ce ai început'],
            'COnexiune': ['fii prezent', 'ascultă mai mult', 'conexiune reală'],
            'COntrol': ['stăpânire de sine', 'lasă ego-ul', 'liniștea interioară'],
            'COraj': ['curaj', 'fii incomod', 'acționează acum'],
            'COpil interior': ['vindecă rana', 'iartă-te', 'acceptă-ți povestea'],
        };

        const allWords = [
            'ridică-te', 'fă ce trebuie', 'disciplină', 'curaj', 'putere',
            'nu mâine. azi.', 'execuție', 'hotărâre', 'determinare',
            'masculinitate', 'onoare', 'caracter', 'integritate',
            'responsabilitate', 'maturitate', 'autoritate interioară',
            'adevăr', 'fără scuze', 'autenticitate', 'direcție', 'scop',
            'transformare', 'libertate', 'evoluție', 'devino', 'crește',
            'cât mai suporți?', 'știi ce ai de făcut', 'fă-o acum',
            'trăiește real', 'alege durerea care construiește',
            'nu ești victimă', 'cine ești de fapt?', 'ce vrei cu adevărat?',
            'spune adevărul', 'renunță la mască', 'fii prezent',
            'fii tată', 'fii lider', 'fii mentor', 'fii exemplu',
            'mergi înainte', 'crește prin durere',
            'construiește ceva care rămâne', 'fii constant',
            'începe acum', 'frica e busola — mergi spre ea',
            'cel mai greu adversar ești tu', 'caracterul se construiește în întuneric',
            'durerea e inevitabilă, suferința e opțională',
            'ordinea bate talentul', 'disciplina e libertate',
            'fii genul de om pe care l-ai fi admirat la 15 ani',
            'nu fugi de tine', 'caută adevărul chiar când doare',
            'singurătatea aleasă e libertate', 'renunță la ce nu te crește',
            'liniște', 'răbdare', 'credință', 'forță', 'esență', 'fundament',
            'în liniște se nasc deciziile', 'ceea ce eviți te controlează',
            'simplitatea e forță', 'acțiunea vindecă frica',
            // Taglines selectate
            'cartea pe care ți-o datorezi',
            'cartea pe care ai amânat-o toată viața',
            'bărbatul pe care-l prefaci că ești îl ucide pe cel care ai putea deveni',
            'nu mai minți. nu mai fugi. nu mai ai timp.',
            'motivația moare. disciplina nu.',
            'fă ce trebuie sau rămâi cine ești',
            'oprește-te. privește-te. începe.',
            'ce s-ar întâmpla dacă ai înceta să te minți?',
            'cartea pe care n-ai vrea s-o citești, dar trebuie',
            'nu e cartea care te face să te simți bine. e cea care te face să fii bine.',
            'confortul te-a distrus. asta e antidotul.',
            'un singur om stă între tine și viața pe care o vrei. ești tu.',
            // Golden phrase — spawns rarely
            'adevărul pe care îl eviți te definește',
            ...Object.keys(themes)
        ];

        // Spawn golden phrase every ~30 seconds
        setInterval(() => spawn('adevărul pe care îl eviți te definește'), 30000);

        const bg = document.getElementById('bgWords');
        const isMobile = window.innerWidth < 600;
        const usedZones = new Set();
        const COLS = isMobile ? 5 : 8;
        const ROWS = isMobile ? 7 : 8;
        const centerCols = isMobile ? [1,2,3] : [2,3,4,5];
        const centerRows = isMobile ? [2,3,4] : [2,3,4,5];

        function getZone() {
            for (let a = 0; a < 50; a++) {
                const c = Math.floor(Math.random() * COLS);
                const r = Math.floor(Math.random() * ROWS);
                const k = c+','+r;
                if (!usedZones.has(k) && !(centerCols.includes(c) && centerRows.includes(r))) {
                    usedZones.add(k);
                    setTimeout(() => usedZones.delete(k), 6000);
                    return {
                        left: Math.min(c / COLS * 82 + 5 + Math.random() * 6, 84),
                        top: Math.min(r / ROWS * 76 + 5 + Math.random() * 6, 80)
                    };
                }
            }
            return null;
        }

        // Smooth JS animation instead of CSS keyframes — full control
        function animateWord(el, dur, startX, startY) {
            const dx = (Math.random() - 0.5) * 80;
            const dy = (Math.random() - 0.5) * 50;
            const start = performance.now();

            function frame(now) {
                const t = Math.min((now - start) / (dur * 1000), 1);

                // Smooth fade: in 0-15%, visible 15-75%, fade 75-100%
                let opacity;
                if (t < 0.1) opacity = t / 0.1;
                else if (t < 0.7) opacity = 1;
                else opacity = 1 - ((t - 0.7) / 0.3);

                // Blur on edges
                const blur = t < 0.08 ? (1 - t/0.08) * 2 : t > 0.85 ? ((t-0.85)/0.15) * 2.5 : 0;

                // Drift
                const x = startX + dx * t;
                const y = startY + dy * t;

                el.style.opacity = opacity;
                el.style.filter = blur > 0.1 ? `blur(${blur}px)` : 'none';
                el.style.left = x + '%';
                el.style.top = y + '%';

                if (t < 1 && el.parentNode) {
                    requestAnimationFrame(frame);
                } else {
                    // Graceful remove with final fade
                    el.style.transition = 'opacity 0.5s';
                    el.style.opacity = 0;
                    setTimeout(() => el.remove(), 500);
                }
            }
            requestAnimationFrame(frame);
        }

        function spawn(forceWord) {
            const pos = getZone();
            if (!pos) return;

            const word = forceWord || allWords[Math.floor(Math.random() * allWords.length)];
            const isCO = themes[word] !== undefined;
            const el = document.createElement('div');
            el.className = 'bg-word';
            el.textContent = word;

            const len = word.length;
            let size;
            if (isCO) {
                size = isMobile ? 14 + Math.random() * 3 : 17 + Math.random() * 7;
                el.style.color = `rgba(212,175,105,${0.12 + Math.random() * 0.08})`;
                el.style.fontWeight = '700';
                el.style.letterSpacing = '0.2em';
            } else if (isMobile) {
                size = len > 25 ? 9 : len > 12 ? 10 + Math.random() * 2 : 11 + Math.random() * 5;
                el.style.color = `rgba(255,255,255,${0.07 + Math.random() * 0.07})`;
            } else {
                size = len > 25 ? 11 + Math.random() * 2 : len > 12 ? 12 + Math.random() * 4 : 13 + Math.random() * 10;
                el.style.color = `rgba(255,255,255,${0.07 + Math.random() * 0.07})`;
            }
            // Special golden phrase — rare, unmissable
            const isGolden = word === 'adevărul pe care îl eviți te definește';
            if (isGolden) {
                size = isMobile ? 15 : 20;
                el.style.color = 'rgba(212,175,105,0.35)';
                el.style.fontWeight = '700';
                el.style.letterSpacing = '0.18em';
                el.style.textShadow = '0 0 30px rgba(212,175,105,0.08)';
            }

            el.style.fontSize = size + 'px';
            if (isMobile) el.style.maxWidth = '40vw';

            // Click — highlight 3s, spawn 2 related
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (el.classList.contains('highlight')) return;
                el.classList.add('highlight');

                const rect = el.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;

                let related;
                if (themes[word]) {
                    related = themes[word];
                } else {
                    const parent = Object.entries(themes).find(([k, v]) => v.includes(word));
                    related = parent ? [parent[0], ...parent[1].filter(w => w !== word)] : null;
                }
                if (!related) {
                    const idx = allWords.indexOf(word);
                    related = allWords.slice(Math.max(0, idx - 2), idx + 3).filter(w => w !== word);
                }

                const picked = related.sort(() => Math.random() - 0.5).slice(0, 2);
                picked.forEach((rw, i) => {
                    setTimeout(() => {
                        const child = document.createElement('div');
                        child.className = 'bg-word';
                        child.textContent = rw;
                        child.style.color = `rgba(212,175,105,${0.14 + Math.random() * 0.08})`;
                        child.style.fontSize = (isMobile ? 11 : 13) + Math.random() * 4 + 'px';
                        if (isMobile) child.style.maxWidth = '40vw';

                        const angle = (Math.PI * 2 / 2) * i + Math.random() * 0.6;
                        const dist = 5 + Math.random() * 4;
                        const sx = Math.min(88, Math.max(5, cx / window.innerWidth * 100 + Math.cos(angle) * dist));
                        const sy = Math.min(82, Math.max(5, cy / window.innerHeight * 100 + Math.sin(angle) * dist));

                        bg.appendChild(child);
                        animateWord(child, 6 + Math.random() * 4, sx, sy);
                    }, i * 400);
                });

                setTimeout(() => el.classList.remove('highlight'), 3000);
            });

            bg.appendChild(el);
            const dur = 12 + Math.random() * 10;
            animateWord(el, dur, pos.left, pos.top);
        }

        // Initial spawn — dense
        for (let i = 0; i < (isMobile ? 22 : 38); i++) setTimeout(spawn, Math.random() * 1800);
        setInterval(spawn, isMobile ? 300 : 200);

        // Ripple (desktop only)
        const canvas = document.getElementById('ripple');
        const ctx = canvas.getContext('2d');
        let ripples = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                ripples.push({ x: e.clientX, y: e.clientY, r: 0, a: 0.05 });
                if (ripples.length > 5) ripples.shift();
            });
        }

        (function drawRipples() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples = ripples.filter(r => r.a > 0.001);
            ripples.forEach(r => {
                r.r += 1.2; r.a *= 0.97;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(212,175,105,${r.a})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            });
            requestAnimationFrame(drawRipples);
        })();

        // Click empty space
        document.addEventListener('click', (e) => {
            if (e.target.closest('.subscribe') || e.target.closest('.footer') || e.target.closest('a') || e.target.classList.contains('bg-word')) return;
            const el = document.createElement('div');
            el.className = 'bg-word';
            el.textContent = allWords[Math.floor(Math.random() * allWords.length)];
            el.style.color = 'rgba(255,255,255,0.16)';
            el.style.fontSize = '14px';
            bg.appendChild(el);
            animateWord(el, 8, e.clientX / window.innerWidth * 100, e.clientY / window.innerHeight * 100);
        });

        // Formspree
        document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const msg = document.getElementById('formMsg');
            const btn = this.querySelector('button');
            btn.disabled = true; btn.textContent = '...';
            try {
                const res = await fetch('https://formspree.io/f/mjgpkwby', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email })
                });
                msg.textContent = res.ok ? 'Mulțumim. Te anunțăm.' : 'Eroare. Încearcă din nou.';
                if (res.ok) document.getElementById('emailInput').value = '';
            } catch { msg.textContent = 'Eroare de conexiune.'; }
            btn.disabled = false; btn.textContent = 'Anunță-mă';
            setTimeout(() => { msg.textContent = ''; }, 5000);
        });
    </script>

</body>
</html>
